<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Kha Yae Pin Mart</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- မျက်စိပသာဒဖြစ်စေမည့် အဆင့်မြင့် Menu block တုံး စတိုင်လ်များ -->
    <style>
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand {
            font-size: 22px;
            font-weight: 800;
            color: #0f172a;
            text-decoration: none;
        }
        .nav-brand span { 
            color: #d97706; /* ရွှေဝါရောင် */
        }

        .nav-links {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-item {
            text-decoration: none;
            color: #475569;
            font-size: 14px;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 8px; /* ထောင့်ဝိုင်း Block တုံး */
            transition: all 0.3s ease;
            background: #f8fafc; /* မရွေးထားရင် အောက်ခံကာလာနုနု */
            border: 1px solid #e2e8f0;
            display: inline-block;
        }

        /* မရွေးထားတဲ့ Menu တွေကို Mouse တင်ရင် ပြောင်းမည့်ပုံစံ */
        .nav-item:hover {
            color: #ffffff;
            background: #f59e0b;
            border-color: #f59e0b;
            transform: translateY(-2px);
        }

        /* ⭐️ ရွေးချယ်ထားတဲ့ ဆက်သွယ်ရန် Menu ကိုပဲ ကာလာ Highlight ထင်ထင်ရှားရှား ပြထားခြင်း */
        .nav-item.active {
            color: #ffffff;
            background: #d97706; /* ရွှေအိုရောင်ရင့် */
            border-color: #d97706;
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            color: #0f172a;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #ffffff;
                padding: 20px;
                box-shadow: 0 10px 15px rgba(0,0,0,0.1);
                gap: 10px;
                box-sizing: border-box;
            }

            .nav-links.show {
                display: flex;
            }

            .nav-item {
                width: 100%;
                text-align: center;
                padding: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ၁။ နဖူးစည်း Header Menu -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fas fa-shopping-bag" style="color: #d97706;"></i> Kha Yae Pin <span>Mart</span>
        </a>
        
        <div class="menu-toggle" id="mobile-menu">
            <i class="fas fa-bars"></i>
        </div>

        <!-- ဆက်သွယ်ရန် (Contact) စာမျက်နှာ ဖြစ်၍ ၎င်းနေရာတွင်သာ active ပြထားပါသည် -->
        <div class="nav-links" id="nav-menu">
            <a href="index.html" class="nav-item">ပင်မစာမျက်နှာ</a>
            <a href="products.html" class="nav-item">ကုန်ပစ္စည်းများ</a>
            <a href="services.html" class="nav-item">ဝန်ဆောင်မှုများ</a>
            <a href="balloon.html" class="nav-item">Balloon ခန်းမ</a>
            <a href="contact.html" class="nav-item active">ဆက်သွယ်ရန်</a>
        </div>
    </nav>

    <!-- လူကြီးမင်း၏ မူလ Contact Page အတွင်းပိုင်းအလှအပများ ဆက်လက်တည်ရှိမည့်နေရာ -->
    <main class="main-container">
        
        <!-- (လူကြီးမင်း ရေးသားထားဖူးသော လိပ်စာ၊ ဖုန်းနံပါတ်၊ မြေပုံ နှင့် Form စာသားများ ဤနေရာတွင် ပုံမှန်အတိုင်း ပေါ်နေပါလိမ့်မည်) -->

    </main>

    <!-- ၅။ Footer -->
    <footer class="footer">
        <p>&copy; 2026 Kha Yae Pin Mart. All Rights Reserved.</p>
    </footer>

    <!-- ဖုန်း Menu စနစ် Javascript -->
    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navMenu = document.getElementById('nav-menu');

        mobileMenu.addEventListener('click', () => {
            navMenu.classList.toggle('show');
            const icon = mobileMenu.querySelector('i');
            if (navMenu.classList.contains('show')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        });
    </script>

</body>
</html>
